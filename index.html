<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardRadar — トレカ最安値レーダー</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --neon-cyan:  #00f5ff;
  --neon-pink:  #ff0080;
  --neon-green: #00ff88;
  --neon-yellow:#ffe600;
  --bg-void:    #030712;
  --bg-deep:    #060d1a;
  --bg-card:    #0a1628;
  --bg-surface: #0f1f35;
  --text-main:  #e2f0ff;
  --text-muted: #4a7090;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg-void);color:var(--text-main);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── 背景グリッド ── */
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px);
  background-size:40px 40px;animation:gridMove 20s linear infinite;}
@keyframes gridMove{to{background-position:40px 40px;}}
.noise{position:fixed;inset:0;z-index:1;opacity:.02;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;}
.wrap{position:relative;z-index:10;}

/* ── ティッカー ── */
.ticker-bar{background:rgba(0,245,255,.04);border-bottom:1px solid rgba(0,245,255,.1);padding:6px 0;overflow:hidden;}
.ticker-inner{display:flex;gap:48px;white-space:nowrap;animation:ticker 40s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.t-item{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);flex-shrink:0;}
.t-name{color:var(--text-main);}
.t-up{color:var(--neon-pink);}
.t-dn{color:var(--neon-green);}
.t-fl{color:var(--text-muted);}

/* ── ヘッダー ── */
.header{background:linear-gradient(180deg,rgba(6,13,26,.98),rgba(3,7,18,.95));
  border-bottom:1px solid rgba(0,245,255,.18);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:50;padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:22px;letter-spacing:.15em;
  background:linear-gradient(135deg,var(--neon-cyan) 0%,#fff 50%,var(--neon-pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(0,245,255,.45));}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.3);
  padding:4px 10px;border-radius:99px;border:1px solid rgba(0,255,136,.25);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--neon-green);
  box-shadow:0 0 8px var(--neon-green);animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{50%{opacity:.3;transform:scale(.8);}}
.live-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--neon-green);letter-spacing:.1em;}
.clock-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);}
.hdr-btn{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;
  padding:8px 16px;border-radius:4px;border:1px solid rgba(0,245,255,.35);
  background:rgba(0,245,255,.06);color:var(--neon-cyan);cursor:pointer;transition:.2s;text-transform:uppercase;}
.hdr-btn:hover{background:rgba(0,245,255,.15);box-shadow:0 0 14px rgba(0,245,255,.25);}

/* ── 統計バー ── */
.stats-row{display:flex;flex-wrap:wrap;gap:20px;align-items:center;
  background:rgba(10,22,40,.9);border:1px solid rgba(0,245,255,.1);
  border-radius:8px;padding:14px 22px;margin:20px 24px 0;}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.15em;color:var(--text-muted);margin-bottom:2px;}
.stat-val{font-family:'Orbitron',monospace;font-weight:700;font-size:18px;}
.stat-div{width:1px;height:32px;background:rgba(255,255,255,.08);}
.stat-spacer{flex:1;}

/* ── セクションラベル ── */
.sec-label{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;
  border-left:2px solid var(--neon-cyan);padding-left:10px;}

/* ── ゲームタブ ── */
.game-tab{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;
  padding:9px 18px;border-radius:4px;cursor:pointer;transition:.2s;user-select:none;
  border:1px solid rgba(0,245,255,.15);background:rgba(10,22,40,.8);
  color:var(--text-muted);text-transform:uppercase;white-space:nowrap;}
.game-tab:hover{border-color:rgba(0,245,255,.4);color:var(--neon-cyan);}
.game-tab.tab-cyan  {border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,245,255,.07);box-shadow:0 0 18px rgba(0,245,255,.2);}
.game-tab.tab-pink  {border-color:var(--neon-pink);color:var(--neon-pink);background:rgba(255,0,128,.07);box-shadow:0 0 18px rgba(255,0,128,.2);}
.game-tab.tab-yellow{border-color:var(--neon-yellow);color:var(--neon-yellow);background:rgba(255,230,0,.07);box-shadow:0 0 18px rgba(255,230,0,.2);}

/* ── 検索 + ソート ── */
.search-wrap{position:relative;flex:1;min-width:220px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);pointer-events:none;width:16px;height:16px;}
.search-input{width:100%;background:rgba(10,22,40,.9);border:1px solid rgba(0,245,255,.2);
  color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:13px;
  padding:10px 14px 10px 38px;border-radius:4px;outline:none;transition:.2s;}
.search-input:focus{border-color:var(--neon-cyan);box-shadow:0 0 16px rgba(0,245,255,.12);}
.search-input::placeholder{color:var(--text-muted);}
.sort-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 14px;
  border-radius:3px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);
  color:var(--text-muted);cursor:pointer;transition:.2s;}
.sort-btn:hover,.sort-btn.active{border-color:rgba(0,245,255,.35);color:var(--neon-cyan);background:rgba(0,245,255,.06);}

/* ── カードグリッド ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:12px 24px 48px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── 価格カード ── */
.p-card{background:var(--bg-card);border:1px solid rgba(0,245,255,.12);border-radius:8px;
  overflow:hidden;transition:.3s;cursor:pointer;position:relative;animation:fadeUp .4s ease both;}
.p-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon-cyan),transparent);opacity:0;transition:.3s;}
.p-card:hover{border-color:rgba(0,245,255,.38);box-shadow:0 8px 36px rgba(0,245,255,.1);transform:translateY(-2px);}
.p-card:hover::before{opacity:1;}

.card-thumb{aspect-ratio:3/4;background:linear-gradient(135deg,#0a1628,#0f2040);
  display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;overflow:hidden;}
.card-thumb::after{content:'';position:absolute;top:-50%;left:0;right:0;height:50%;
  background:linear-gradient(transparent,rgba(0,245,255,.025),transparent);
  animation:scan 3.5s linear infinite;}
@keyframes scan{to{top:150%;}}

.rarity-badge{position:absolute;top:8px;right:8px;font-family:'Orbitron',monospace;
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:2px;letter-spacing:.1em;}
.r-sec{background:linear-gradient(135deg,var(--neon-pink),#8b0057);color:#fff;box-shadow:0 0 10px rgba(255,0,128,.5);}
.r-ur {background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;box-shadow:0 0 10px rgba(255,215,0,.4);}
.r-sr {background:linear-gradient(135deg,#c0c0c0,#808080);color:#000;}
.r-r  {background:linear-gradient(135deg,#4169e1,#1e3a8a);color:#fff;}
.hot-badge{position:absolute;top:8px;left:8px;font-family:'Orbitron',monospace;font-size:8px;
  font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.08em;
  background:linear-gradient(135deg,#ff4400,#ff0080);color:#fff;box-shadow:0 0 8px rgba(255,68,0,.5);}

.card-body{padding:12px;}
.card-name{font-weight:700;font-size:14px;line-height:1.3;}
.card-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);}
.card-set {font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:10px;}
.name-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:2px;}

.chg{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;flex-shrink:0;}
.chg-up{color:var(--neon-pink);background:rgba(255,0,128,.1);border:1px solid rgba(255,0,128,.3);}
.chg-dn{color:var(--neon-green);background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);}
.chg-fl{color:var(--text-muted);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);}

.lowest-block{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);
  border-radius:5px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.lowest-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--neon-green);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
.lowest-price{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--neon-green);}
.lowest-site{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);text-align:right;}

.price-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px;}
.price-cell{background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.05);border-radius:4px;padding:7px 8px;}
.price-cell.low{border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.05);}
.p-site{font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:2px;}
.p-val{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;}
.p-up{color:var(--neon-pink);}
.p-dn{color:var(--neon-green);}

.alert-btn{width:100%;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;
  letter-spacing:.1em;padding:8px;border-radius:3px;border:1px solid rgba(0,245,255,.3);
  background:rgba(0,245,255,.05);color:var(--neon-cyan);cursor:pointer;transition:.2s;text-transform:uppercase;}
.alert-btn:hover{background:rgba(0,245,255,.15);box-shadow:0 0 12px rgba(0,245,255,.2);}

.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;
  font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);}

/* ── モーダル ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg-deep);border:1px solid rgba(0,245,255,.3);border-radius:8px;
  padding:32px;width:90%;max-width:460px;position:relative;overflow:hidden;
  transform:translateY(20px);transition:transform .3s;box-shadow:0 0 60px rgba(0,245,255,.12);}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--neon-cyan),var(--neon-pink),transparent);}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;
  color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;}
.modal-title{font-family:'Orbitron',monospace;font-weight:900;font-size:17px;color:var(--neon-cyan);margin-bottom:4px;}
.modal-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:22px;}
.form-lbl{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:.12em;
  color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:7px;}
.form-input{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(0,245,255,.2);
  border-radius:4px;padding:10px 13px;color:var(--text-main);
  font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:.2s;margin-bottom:16px;}
.form-input:focus{border-color:var(--neon-cyan);box-shadow:0 0 12px rgba(0,245,255,.1);}
.form-input::placeholder{color:var(--text-muted);}
.form-select{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(0,245,255,.2);
  border-radius:4px;padding:10px 13px;color:var(--text-main);
  font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;cursor:pointer;margin-bottom:16px;}
.form-select option{background:var(--bg-deep);}
.notify-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.notify-opt{display:flex;align-items:center;gap:8px;padding:10px;
  border:1px solid rgba(0,245,255,.2);border-radius:4px;cursor:pointer;background:rgba(0,245,255,.03);}
.notify-opt span{font-family:'JetBrains Mono',monospace;font-size:12px;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;
  background:rgba(0,245,255,.2);outline:none;margin-bottom:4px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--neon-cyan);cursor:pointer;box-shadow:0 0 8px var(--neon-cyan);}
.range-labels{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--text-muted);margin-bottom:16px;}
.submit-btn{width:100%;font-family:'Orbitron',monospace;font-weight:700;font-size:11px;
  letter-spacing:.15em;padding:13px;border-radius:4px;border:none;
  background:linear-gradient(135deg,var(--neon-cyan),#0080ff);color:#000;cursor:pointer;
  transition:.2s;text-transform:uppercase;box-shadow:0 4px 20px rgba(0,245,255,.3);}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,245,255,.4);}

/* ── トースト ── */
.toast{position:fixed;bottom:28px;right:28px;z-index:9999;
  background:var(--bg-deep);border:1px solid var(--neon-green);border-radius:6px;
  padding:13px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--neon-green);
  box-shadow:0 0 24px rgba(0,255,136,.2);transform:translateX(130%);transition:transform .4s cubic-bezier(.16,1,.3,1);}
.toast.show{transform:translateX(0);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,245,255,.3);border-radius:2px;}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="noise"></div>
<div class="toast" id="toastEl"></div>

<!-- ティッカー -->
<div class="ticker-bar">
  <div class="ticker-inner" id="tickerEl"></div>
</div>

<!-- ヘッダー -->
<header class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">CARD<span style="color:var(--neon-pink)">RADAR</span></div>
    <div class="live-badge"><div class="live-dot"></div><span class="live-txt">LIVE</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="clock-txt" id="clockEl"></span>
    <button class="hdr-btn" onclick="openModal(null)">+ アラート設定</button>
  </div>
</header>

<div class="wrap">

  <!-- 統計バー -->
  <div class="stats-row">
    <div><div class="stat-lbl">監視カード数</div><div class="stat-val" style="color:var(--neon-cyan)">2,847</div></div>
    <div class="stat-div"></div>
    <div><div class="stat-lbl">24h 最安値更新</div><div class="stat-val" style="color:var(--neon-green)">134件</div></div>
    <div class="stat-div"></div>
    <div><div class="stat-lbl">平均価格変動</div><div class="stat-val" style="color:var(--neon-pink)">▲ 3.2%</div></div>
    <div class="stat-div"></div>
    <div><div class="stat-lbl">今日の取引数</div><div class="stat-val" style="color:var(--neon-yellow)">18,490</div></div>
    <div class="stat-spacer"></div>
    <div style="text-align:right">
      <div class="stat-lbl">最終更新</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px" id="updateEl">--:--:--</div>
    </div>
  </div>

  <!-- ゲームタブ -->
  <div style="padding:20px 24px 0">
    <div class="sec-label" style="margin-bottom:12px">ゲーム選択</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      <button class="game-tab tab-cyan"  data-game="pokemon"    onclick="switchGame(this)">⚡ ポケモン</button>
      <button class="game-tab"           data-game="onepiece"   onclick="switchGame(this)">☠ ワンピース</button>
      <button class="game-tab"           data-game="yugioh"     onclick="switchGame(this)">👁 遊戯王</button>
      <button class="game-tab"           data-game="dragonball" onclick="switchGame(this)">🔮 ドラゴンボール</button>
      <button class="game-tab"           data-game="cardfight"  onclick="switchGame(this)">⚔ ヴァンガード</button>
    </div>
  </div>

  <!-- 検索 + ソート -->
  <div style="display:flex;flex-wrap:wrap;gap:10px;padding:16px 24px 0;align-items:center">
    <div class="search-wrap">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input type="text" id="searchEl" class="search-input"
        placeholder="カード名・型番・弾名で検索... 例: リザードン / sv3a"
        oninput="onSearch()">
    </div>
    <button class="sort-btn active" id="s-price"  onclick="setSort('price',this)">価格順</button>
    <button class="sort-btn"        id="s-change" onclick="setSort('change',this)">変動率</button>
    <button class="sort-btn"        id="s-new"    onclick="setSort('new',this)">新着順</button>
  </div>

  <!-- グリッドヘッダー -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 24px 0">
    <div class="sec-label" id="gameLabelEl">ポケモンカード</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted)" id="countEl">0件</div>
  </div>

  <!-- カードグリッド -->
  <div class="card-grid" id="gridEl"></div>

</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="onOverlayClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">🔔 価格アラート設定</div>
    <div class="modal-sub" id="modalSubEl"></div>

    <label class="form-lbl">通知価格（円以下）</label>
    <input type="number" class="form-input" id="alertPriceEl" placeholder="例: 5000" min="0">
    <input type="range"  id="priceRangeEl" min="100" max="100000" value="5000"
           oninput="document.getElementById('alertPriceEl').value=this.value">
    <div class="range-labels"><span>¥100</span><span>¥100,000</span></div>

    <label class="form-lbl">対象プラットフォーム</label>
    <select class="form-select">
      <option>すべてのサイト</option>
      <option>メルカリのみ</option>
      <option>ヤフオクのみ</option>
      <option>大手ショップのみ</option>
    </select>

    <label class="form-lbl">通知方法</label>
    <div class="notify-row">
      <label class="notify-opt">
        <input type="radio" name="nm" value="email" checked style="accent-color:var(--neon-cyan)">
        <span>📧 メール</span>
      </label>
      <label class="notify-opt">
        <input type="radio" name="nm" value="line" style="accent-color:var(--neon-cyan)">
        <span>💬 LINE</span>
      </label>
    </div>

    <label class="form-lbl">メールアドレス</label>

  pokemon:    { label:"ポケモンカード",                   cls:"tab-cyan"   },
  onepiece:   { label:"ワンピースカードゲーム",             cls:"tab-pink"   },
  yugioh:     { label:"遊戯王カード",                     cls:"tab-yellow" },
  dragonball: { label:"ドラゴンボールスーパーカードゲーム",  cls:"tab-yellow" },
  cardfight:  { label:"カードファイト!! ヴァンガード",       cls:"tab-cyan"   },
};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ③ アプリ状態
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let state = { game:"pokemon", query:"", sort:"price" };

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ④ ユーティリティ関数
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const yen = n => '¥' + n.toLocaleString('ja-JP');

// 3サイトの最安値を返す
function lowest(card) {
  return Math.min(card.prices.mercari.c, card.prices.yahoo.c, card.prices.shop.c);
}

// 最安値のサイトキーを返す
function lowestKey(card) {
  const p = card.prices;
  if (p.mercari.c <= p.yahoo.c && p.mercari.c <= p.shop.c) return 'mercari';
  if (p.yahoo.c   <= p.shop.c)                              return 'yahoo';
  return 'shop';
}

const SITE_LABEL = { mercari:"メルカリ", yahoo:"ヤフオク", shop:"大手ショップ" };

// 平均変動率 (%)
function avgChg(card) {
  const p = card.prices;
  const sum = ['mercari','yahoo','shop'].reduce((a,k) => a + (p[k].c - p[k].p) / p[k].p, 0);
  return (sum / 3 * 100).toFixed(1);
}

// 変動バッジHTML
function chgBadge(pct) {
  const n = parseFloat(pct);
  if (n >  0.3) return `<span class="chg chg-up">▲ ${Math.abs(n)}%</span>`;
  if (n < -0.3) return `<span class="chg chg-dn">▼ ${Math.abs(n)}%</span>`;
  return               `<span class="chg chg-fl">→ ${Math.abs(n)}%</span>`;
}

// 価格上昇・下降のCSSクラス
function priceCls(cur, prev) {
  if (cur < prev) return 'p-dn';
  if (cur > prev) return 'p-up';
  return '';
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑤ フィルター & ソート
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function getCards() {
  // ─ ゲームで絞り込み（タブ切り替えロジック）
  let res = cards.filter(c => c.game === state.game);

  // ─ 検索クエリで絞り込み（検索ロジック）
  //   カード名 / 型番 / 弾名 を小文字で比較
  const q = state.query.trim().toLowerCase();
  if (q !== '') {
    res = res.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.code.toLowerCase().includes(q) ||
      c.set.toLowerCase().includes(q)
    );
  }

  // ─ ソート
  if      (state.sort === 'price')  res.sort((a,b) => lowest(a) - lowest(b));
  else if (state.sort === 'change') res.sort((a,b) => Math.abs(parseFloat(avgChg(b))) - Math.abs(parseFloat(avgChg(a))));
  else if (state.sort === 'new')    res.reverse();

  return res;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑥ 1枚分のHTML生成
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function cardHTML(card, idx) {
  const lk  = lowestKey(card);
  const lv  = lowest(card);
  const pct = avgChg(card);
  const p   = card.prices;

  return `
<div class="p-card" style="animation-delay:${idx*55}ms">
  <div class="card-thumb">
    ${card.emoji}
    <span class="rarity-badge ${card.rc}">${card.rarity}</span>
    ${card.hot ? '<span class="hot-badge">🔥 HOT</span>' : ''}
  </div>
  <div class="card-body">
    <div class="name-row">
      <div class="card-name">${card.name}</div>
      ${chgBadge(pct)}
    </div>
    <div class="card-code">${card.code}</div>
    <div class="card-set">${card.set}</div>

    <div class="lowest-block">
      <div>
        <div class="lowest-lbl">最安値</div>
        <div class="lowest-price">${yen(lv)}</div>
      </div>
      <div class="lowest-site">${SITE_LABEL[lk]}</div>
    </div>

    <div class="price-row">
      <div class="price-cell ${lk==='mercari'?'low':''}">
        <div class="p-site">メルカリ</div>
        <div class="p-val ${priceCls(p.mercari.c,p.mercari.p)}">${yen(p.mercari.c)}</div>
      </div>
      <div class="price-cell ${lk==='yahoo'?'low':''}">
        <div class="p-site">ヤフオク</div>
        <div class="p-val ${priceCls(p.yahoo.c,p.yahoo.p)}">${yen(p.yahoo.c)}</div>
      </div>
      <div class="price-cell ${lk==='shop'?'low':''}">
        <div class="p-site">大手ショップ</div>
        <div class="p-val ${priceCls(p.shop.c,p.shop.p)}">${yen(p.shop.c)}</div>
      </div>
    </div>

    <button class="alert-btn" onclick="openModal('${card.id}')">
      🔔 価格アラートを設定する
    </button>
  </div>
</div>`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑦ グリッド描画（メイン描画関数）
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function render() {
  const list = getCards();
  document.getElementById('gameLabelEl').textContent = GAMES[state.game].label;
  document.getElementById('countEl').textContent     = `${list.length}件`;

  if (list.length === 0) {
    document.getElementById('gridEl').innerHTML =
      `<div class="empty-state">「${state.query}」に一致するカードが見つかりませんでした</div>`;
    return;
  }
  document.getElementById('gridEl').innerHTML = list.map((c,i) => cardHTML(c,i)).join('');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑧ イベントハンドラ
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

// タブ切り替え
function switchGame(btn) {
  state.game  = btn.dataset.game;
  state.query = '';
  document.getElementById('searchEl').value = '';

  document.querySelectorAll('.game-tab')
    .forEach(t => t.classList.remove('tab-cyan','tab-pink','tab-yellow'));
  btn.classList.add(GAMES[state.game].cls);

  render();
}

// 検索（oninput から呼ばれる）
function onSearch() {
  state.query = document.getElementById('searchEl').value;
  render();  // 入力のたびに再描画するだけ
}

// ソート
function setSort(type, btn) {
  state.sort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑨ モーダル
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function openModal(cardId) {
  const overlay = document.getElementById('modalOverlay');
  if (cardId) {
    const card = cards.find(c => c.id === cardId);
    if (card) {
      document.getElementById('modalSubEl').textContent = `${card.name} — ${card.code}`;
      const sug = Math.round(lowest(card) * 0.85);
      document.getElementById('alertPriceEl').value = sug;
      document.getElementById('priceRangeEl').value = Math.min(sug, 100000);
    }
  } else {
    document.getElementById('modalSubEl').textContent = '全カード監視モード';
  }
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function submitAlert() {
  const email = document.getElementById('alertEmailEl').value.trim();
  const price = document.getElementById('alertPriceEl').value;
  if (!email || !price) {
    const el = document.getElementById('alertEmailEl');
    el.style.borderColor = 'var(--neon-pink)';
    setTimeout(() => { el.style.borderColor = ''; }, 2000);
    return;
  }
  closeModal();
  toast(`✓ ¥${parseInt(price).toLocaleString()} 以下でアラートを設定しました`);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑩ ティッカー
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function buildTicker() {
  const items = cards.map(c => {
    const pct = parseFloat(avgChg(c));
    const cls = pct > 0.3 ? 't-up' : pct < -0.3 ? 't-dn' : 't-fl';
    const arr = pct > 0.3 ? '▲' : pct < -0.3 ? '▼' : '→';
    return `<div class="t-item"><span class="t-name">${c.name}</span> ${yen(lowest(c))} <span class="${cls}">${arr}${Math.abs(pct)}%</span></div>`;
  });
  document.getElementById('tickerEl').innerHTML = [...items,...items].join('');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑪ 時計 & ライブシミュレーション
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function tick() {
  const t = new Date().toLocaleTimeString('ja-JP',{hour12:false});
  document.getElementById('clockEl').textContent  = t;
  document.getElementById('updateEl').textContent = t;
}

function simulateLive() {
  const card = cards[Math.floor(Math.random() * cards.length)];
  const keys = ['mercari','yahoo','shop'];
  const key  = keys[Math.floor(Math.random() * 3)];
  const old  = card.prices[key].c;
  const delta = (Math.random() - 0.5) * 0.06;
  card.prices[key].p = old;
  card.prices[key].c = Math.max(100, Math.round(old * (1 + delta)));
  if (card.game === state.game) render();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑫ トースト
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⑬ 初期化
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
render();                                   // ← カードを最初に描画
buildTicker();                              // ← ティッカー生成
tick();                                     // ← 時計即時表示
setInterval(tick,         1000);            // ← 毎秒更新
setInterval(simulateLive, 5000);            // ← 5秒ごとライブ価格シミュレーション
</script>
</body>
</html>
